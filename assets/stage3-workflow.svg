<svg xmlns="http://www.w3.org/2000/svg" width="600" height="980" viewBox="0 0 600 980">
  <!-- Background -->
  <rect width="600" height="980" fill="#0f172a"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold"
        fill="#f1f5f9" text-anchor="middle">Stage 3 Agent Reasoning Workflow</text>
  <text x="300" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b"
        text-anchor="middle">Nexora Customer Success FTE</text>

  <!-- ── Step helper: y positions ── -->
  <!-- Step 1: y=70  Step 2: y=150  Step 3: y=230  Step 4: y=310  Step 5: y=390
       Step 6: y=470  (decision diamond)
       Escalate: y=470 (right branch)  Continue: y=550
       Step 7: y=550  Step 8: y=630  Step 9: y=710  Step 10: y=790 -->

  <!-- STEP 1 -->
  <rect x="150" y="70" width="300" height="46" rx="8" fill="#1d4ed8"/>
  <text x="300" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">1</text>
  <text x="300" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Customer Message Received</text>
  <line x1="300" y1="116" x2="300" y2="145" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 2 -->
  <rect x="150" y="145" width="300" height="46" rx="8" fill="#1d4ed8"/>
  <text x="300" y="163" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">2</text>
  <text x="300" y="179" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Normalize Channel Input</text>
  <line x1="300" y1="191" x2="300" y2="220" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 3 -->
  <rect x="150" y="220" width="300" height="46" rx="8" fill="#1e40af"/>
  <text x="300" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">3</text>
  <text x="300" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Retrieve Conversation History</text>
  <line x1="300" y1="266" x2="300" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 4 -->
  <rect x="150" y="295" width="300" height="46" rx="8" fill="#1e40af"/>
  <text x="300" y="313" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">4</text>
  <text x="300" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Retrieve Customer Context</text>
  <line x1="300" y1="341" x2="300" y2="370" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 5 -->
  <rect x="150" y="370" width="300" height="46" rx="8" fill="#0369a1"/>
  <text x="300" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#bae6fd" text-anchor="middle" font-weight="bold">5</text>
  <text x="300" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Search Knowledge Base</text>
  <line x1="300" y1="416" x2="300" y2="445" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 6: Decision Diamond -->
  <polygon points="300,445 430,490 300,535 170,490" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="300" y="483" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e9d5ff" text-anchor="middle" font-weight="bold">6</text>
  <text x="300" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Evaluate Escalation Rules?</text>

  <!-- YES branch (right) -->
  <line x1="430" y1="490" x2="510" y2="490" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="468" y="483" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle">Yes</text>
  <rect x="510" y="468" width="70" height="46" rx="6" fill="#991b1b"/>
  <text x="545" y="488" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Escalate</text>
  <text x="545" y="503" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Issue</text>

  <!-- NO branch (down) -->
  <line x1="300" y1="535" x2="300" y2="562" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="315" y="553" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#93c5fd">No</text>

  <!-- STEP 7 -->
  <rect x="150" y="562" width="300" height="46" rx="8" fill="#0369a1"/>
  <text x="300" y="580" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#bae6fd" text-anchor="middle" font-weight="bold">7</text>
  <text x="300" y="596" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Generate AI Response (KB miss)</text>
  <line x1="300" y1="608" x2="300" y2="637" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 8 -->
  <rect x="150" y="637" width="300" height="46" rx="8" fill="#0f766e"/>
  <text x="300" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#99f6e4" text-anchor="middle" font-weight="bold">8</text>
  <text x="300" y="671" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Create Ticket</text>
  <line x1="300" y1="683" x2="300" y2="712" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 9 -->
  <rect x="150" y="712" width="300" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="730" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="bold">9</text>
  <text x="300" y="746" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Store in Database</text>
  <line x1="300" y1="758" x2="300" y2="787" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- STEP 10 -->
  <rect x="150" y="787" width="300" height="46" rx="8" fill="#15803d"/>
  <text x="300" y="805" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#bbf7d0" text-anchor="middle" font-weight="bold">10</text>
  <text x="300" y="821" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Return Formatted Response</text>

  <!-- Footer -->
  <text x="300" y="955" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#334155"
        text-anchor="middle">Hackathon 5 | Nexora Stage 3 | Author: Mehreen Asghar</text>
</svg>
