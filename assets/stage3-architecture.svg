<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold"
        fill="#f1f5f9" text-anchor="middle">Nexora Customer Success FTE — Stage 3 Architecture</text>

  <!-- ── SECTION LABEL: Channels ── -->
  <text x="450" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8"
        text-anchor="middle" font-style="italic">Channels</text>

  <!-- Gmail box -->
  <rect x="110" y="80" width="140" height="44" rx="8" fill="#1e40af"/>
  <text x="180" y="107" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Gmail</text>

  <!-- WhatsApp box -->
  <rect x="380" y="80" width="140" height="44" rx="8" fill="#1e40af"/>
  <text x="450" y="107" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#ffffff" text-anchor="middle">WhatsApp</text>

  <!-- Web Form box -->
  <rect x="650" y="80" width="140" height="44" rx="8" fill="#1e40af"/>
  <text x="720" y="107" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Web Form</text>

  <!-- Arrows from Channels down to Gateway -->
  <line x1="180" y1="124" x2="400" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="124" x2="450" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="124" x2="500" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI Gateway box -->
  <rect x="310" y="190" width="280" height="50" rx="8" fill="#7c3aed"/>
  <text x="450" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="bold"
        fill="#ffffff" text-anchor="middle">FastAPI Gateway</text>

  <!-- Arrow Gateway → AI Agent -->
  <line x1="450" y1="240" x2="450" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Agent Workflow box -->
  <rect x="300" y="295" width="300" height="50" rx="8" fill="#4338ca"/>
  <text x="450" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="bold"
        fill="#ffffff" text-anchor="middle">AI Agent Workflow</text>

  <!-- Arrow Agent → Knowledge Base (left) -->
  <line x1="300" y1="320" x2="210" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Knowledge Base box -->
  <rect x="60" y="296" width="150" height="50" rx="8" fill="#15803d"/>
  <text x="135" y="321" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Knowledge</text>
  <text x="135" y="337" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Base</text>

  <!-- Arrow Agent → LLM Reasoning (right) -->
  <line x1="600" y1="320" x2="695" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Reasoning box -->
  <rect x="695" y="293" width="155" height="56" rx="8" fill="#c2410c"/>
  <text x="772" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#ffffff" text-anchor="middle">LLM Reasoning</text>
  <text x="772" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#fed7aa"
        text-anchor="middle">Claude / GPT-4 / Gemini</text>

  <!-- Arrow Agent → MCP Tools (down) -->
  <line x1="450" y1="345" x2="450" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCP Tools box -->
  <rect x="340" y="400" width="220" height="44" rx="8" fill="#475569"/>
  <text x="450" y="427" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#ffffff" text-anchor="middle">MCP Tools</text>

  <!-- Arrow MCP → Database (down) -->
  <line x1="450" y1="444" x2="450" y2="495" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite / PostgreSQL box -->
  <rect x="310" y="495" width="280" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="522" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#e2e8f0" text-anchor="middle">SQLite / PostgreSQL</text>

  <!-- Arrow Database → Dashboard (up-right) -->
  <path d="M590,517 Q720,517 720,460 Q720,400 720,380" stroke="#475569" stroke-width="1.5"
        fill="none" marker-end="url(#arrow)"/>

  <!-- Next.js Dashboard box -->
  <rect x="640" y="330" width="165" height="0" rx="8" fill="none"/>
  <!-- Repositioned below LLM to avoid overlap -->
  <rect x="634" y="450" width="166" height="50" rx="8" fill="#0369a1"/>
  <text x="717" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Next.js</text>
  <text x="717" y="488" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Dashboard</text>

  <!-- Arrow line from DB to Dashboard (direct) -->
  <line x1="590" y1="517" x2="634" y2="490" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Legend / footer -->
  <text x="450" y="578" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#475569"
        text-anchor="middle">Hackathon 5 | Nexora Stage 3 | Author: Mehreen Asghar</text>
</svg>
