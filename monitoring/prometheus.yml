# Prometheus Configuration — Nexora Customer Success Digital FTE (Stage 3)
#
# Usage:
#   prometheus --config.file=monitoring/prometheus.yml
#
# With docker-compose:
#   Add prometheus service to docker-compose.yml:
#     prometheus:
#       image: prom/prometheus:v2.48.0
#       volumes:
#         - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
#       ports:
#         - "9090:9090"
#
# With Kubernetes:
#   Mount as ConfigMap and reference in Prometheus Operator CRD.

global:
  scrape_interval: 15s          # Scrape every 15 seconds
  evaluation_interval: 15s      # Evaluate rules every 15 seconds
  scrape_timeout: 10s
  external_labels:
    environment: "production"
    project: "nexora-cs"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093  # Alertmanager service host:port

# Load alerting rules
rule_files:
  - "alert_rules.yml"           # Generated from monitoring/alerts.md

# Scrape configurations
scrape_configs:

  # ----------------------------------------------------------------
  # Prometheus self-monitoring
  # ----------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ----------------------------------------------------------------
  # Nexora FastAPI backend
  # ----------------------------------------------------------------
  - job_name: "nexora-api"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nexora-api:8000"       # docker-compose / k8s service
          - "localhost:8000"        # local development fallback
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: "nexora-api"

  # ----------------------------------------------------------------
  # Nexora worker processes
  # ----------------------------------------------------------------
  - job_name: "nexora-worker-retry"
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nexora-worker-retry:9090"
    relabel_configs:
      - target_label: service
        replacement: "retry-worker"

  - job_name: "nexora-worker-metrics"
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nexora-worker-metrics:9091"
    relabel_configs:
      - target_label: service
        replacement: "metrics-worker"

  # ----------------------------------------------------------------
  # PostgreSQL (via postgres_exporter)
  # ----------------------------------------------------------------
  - job_name: "postgres"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "postgres-exporter:9187"
    relabel_configs:
      - target_label: service
        replacement: "postgres"

  # ----------------------------------------------------------------
  # Kafka (via kafka_exporter)
  # ----------------------------------------------------------------
  - job_name: "kafka"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "kafka-exporter:9308"
    relabel_configs:
      - target_label: service
        replacement: "kafka"

  # ----------------------------------------------------------------
  # Redis (via redis_exporter)
  # ----------------------------------------------------------------
  - job_name: "redis"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "redis-exporter:9121"
    relabel_configs:
      - target_label: service
        replacement: "redis"

  # ----------------------------------------------------------------
  # Node / container metrics (via node_exporter or cAdvisor)
  # ----------------------------------------------------------------
  - job_name: "node"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "node-exporter:9100"
    relabel_configs:
      - target_label: service
        replacement: "node"

  - job_name: "cadvisor"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "cadvisor:8080"
    relabel_configs:
      - target_label: service
        replacement: "cadvisor"

  # ----------------------------------------------------------------
  # Kubernetes pod auto-discovery (if running on k8s)
  # ----------------------------------------------------------------
  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      # Only scrape pods with annotation prometheus.io/scrape=true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      # Use custom metrics path if annotated
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      # Use custom port if annotated
      - source_labels:
          - __address__
          - __meta_kubernetes_pod_annotation_prometheus_io_port
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      # Carry over pod metadata as labels
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
