---
# ── PostgreSQL Service ─────────────────────────────────────────
# Used when running PostgreSQL inside the cluster (dev/staging only)
# In production, use an external managed DB (AWS RDS, Cloud SQL)
apiVersion: v1
kind: Service
metadata:
  name: nexora-postgres
  namespace: nexora
  labels:
    app: nexora-cs-fte
    component: postgres
spec:
  type: ClusterIP
  selector:
    app: nexora-cs-fte
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# ── Kafka Service ──────────────────────────────────────────────
# Internal access only — workers connect via this service
apiVersion: v1
kind: Service
metadata:
  name: nexora-kafka
  namespace: nexora
  labels:
    app: nexora-cs-fte
    component: kafka
spec:
  type: ClusterIP
  selector:
    app: nexora-cs-fte
    component: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: internal
      port: 29092
      targetPort: 29092
      protocol: TCP
