# ============================================================
# Nexora Customer Success Digital FTE — Services
# Internal ClusterIP services for all components
# ============================================================

---
# ── API Service (internal) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nexora-api
  namespace: nexora
  labels:
    app: nexora-cs-fte
    component: api
spec:
  type: ClusterIP
  selector:
    app: nexora-cs-fte
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP

---
# ── API Service (NodePort for local k8s testing) ───────────────
# Uncomment when using minikube / kind without an ingress controller
