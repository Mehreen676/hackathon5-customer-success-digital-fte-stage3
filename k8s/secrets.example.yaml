# ============================================================
# Nexora Customer Success Digital FTE — Secrets (EXAMPLE)
# ============================================================
# DO NOT commit real secrets. This file shows the structure only.
# Create real secrets with:
#
#   kubectl create secret generic nexora-secrets \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --namespace=nexora
#
# Or use an external secrets manager (AWS SSM, GCP Secret Manager,
# HashiCorp Vault) via the External Secrets Operator.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secrets
  namespace: nexora
  labels:
    app: nexora-cs-fte
    stage: "3"
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────
  DATABASE_URL: "postgresql://nexora:CHANGE_ME@nexora-postgres:5432/nexora_support"

  # ── LLM API Keys — set the one matching LLM_PROVIDER ────────
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"
  OPENAI_API_KEY: "sk-CHANGE_ME"
  GEMINI_API_KEY: "CHANGE_ME"

  # ── Optional: Slack escalation webhook ──────────────────────
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/CHANGE_ME"

  # ── Optional: Twilio (Stage 4 WhatsApp send) ────────────────
  TWILIO_ACCOUNT_SID: "ACCHANGE_ME"
  TWILIO_AUTH_TOKEN: "CHANGE_ME"
